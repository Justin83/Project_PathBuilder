  board_id: "18414133952"
  board_name: "Project PathBuilder Charter — Homeschool Biology Co-op"
  board_url: "https://arsg-squad.monday.com/boards/18414133952"
  # Group IDs — populate after first Monday inspection
  groups:
    intake_ideas:        "[tbd]"
    infrastructure:      "[tbd]"
    curriculum_planning: "[tbd]"
    documents_handouts:  "[tbd]"
    labs_equipment:      "[tbd]"
    website_app:         "[tbd]"
    review_approval:     "[tbd]"
    done:                "[tbd]"

slack:
  workspace: kypfapi.slack.com
  channels:
    changelog:
      id: C0ATANVNBBR
      name: "#changelog"
      use: completed work, sprint summaries, shipped features
    handoff:
      id: C0ATQ81QA75
      name: "#hand-off"
      use: session handoffs, next steps, blockers for Justin
    debugging:
      id: C0ATS3QKPQE
      name: "#debugging"
