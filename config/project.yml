project:
  name: Project PathBuilder
  short_name: pathbuilder
  owner: Justin Howard
  org: ARSG
  description: >
    Homeschool/co-op biology curriculum and platform project.
    First course: 15-week biology co-op for mostly 9th graders (some 8th).
    Primary text: OpenStax Concepts of Biology (free).
    Model: parent-primary grading, Justin-led weekly Tuesday sessions and lab days.
  local_path: C:\xampp\htdocs\Project_PathBuilder
  github_repo: "[set when repo is on GitHub]"
  status: active — curriculum planning / infrastructure setup

