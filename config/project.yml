infrastructure:
  digitalocean:
    token_status: "BROKEN — last audit returned HTTP 401. Refresh before DO API work."
    postgres_status: "WORKING — doadmin authenticated via postgres MCP"
    spaces_status: "UNKNOWN — requires separate S3 key pair (SPACES_KEY / SPACES_SECRET)"
  apps:
    kentuckypathfinderapi:
      app_id: "71478695-2484-4d38-8a35-4977b5af524a"
      url: "https://kentuckypathfinderapi-yf658.ondigitalocean.app"
      touch: "READ ONLY — do not modify"
    remote_rob:
      app_id: "27953397-1097-46d8-9b09-928a121208d"
      url: "https://remote-rob-nbhz2.ondigitalocean.app"
      touch: "READ ONLY — do not modify"
  postgres:
    source_of_truth: DigitalOcean managed Postgres cluster (doadmin)
    existing_schemas:
      - pathfinder_performance_dev   # 16 tables — KYPF dev/staging
      - transfer_poc                 # 35 tables — includes rob_* tables
      - public                       # empty
    pathbuilder_schema: pathbuilder  # TO BE CREATED — not yet applied
    isolation_pattern: schema-level (not table-name prefixes)
  spaces:
    pathbuilder_prefix: "pathbuilder/"
    proposed_structure: |
      pathbuilder/
        biology/
          2026-fall/
            week-01/ ... week-15/
            labs/
            parent-guides/
            student-handouts/
        rendered-pdfs/
        images/
        downloads/
        source-exports/

agents:
  known:
    - claude-cli
    - claude-code
    - remote-rob
    - codex
    - chatgpt
  credentials_vault: agent-credentials
  env_pattern: "op run --env-file ./agents/[agent].env -- [command]"

toolstack:
  languages: [PHP, Python, JavaScript, HTML/CSS]
  db: PostgreSQL (DigitalOcean Managed)
  version_control: Git / GitHub
  local_dev: XAMPP, VS Code, PowerShell
  mcp_servers: [monday.com, Slack, postgres, digitalocean]
  cli_tools: [git, gh, op, doctl, curl]
